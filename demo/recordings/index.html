<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rec Status</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-red: #ff4b4b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease;
        }

        .status-container {
            text-align: center;
        }

        .indicator {
            width: 20px;
            height: 20px;
            background-color: var(--accent-red);
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            opacity: 0.7;
            margin-bottom: 30px;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-red);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Hidden state */
        .hidden-ui .indicator, .hidden-ui h1, .hidden-ui p {
            visibility: hidden;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="content" class="status-container">
        <div class="indicator"></div>
        <h1>Recording</h1>
        <p>Security Robot Data Collection Active</p>
    </div>

    <label class="switch">
        <input type="checkbox" checked id="toggle">
        <span class="slider"></span>
    </label>

    <script>
        const toggle = document.getElementById('toggle');
        const content = document.getElementById('content');

        toggle.addEventListener('change', () => {
            if(toggle.checked) {
                content.style.visibility = "visible";
                content.style.opacity = "1";
            } else {
                content.style.visibility = "hidden";
                content.style.opacity = "0";
            }
        });
    </script>
</body>
</html>
