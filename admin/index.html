<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morrow Industries — Command Center</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;500&family=Space+Grotesk:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2ca50", 
                        "background": "#131313",
                        "surface": "#1c1b1b",
                        "on-surface-variant": "#d0c5af",
                        "error": "#ffb4ab",
                        "gold": "#d4af37"
                    },
                    spacing: {
                        "card-padding": "32px",
                        "grid-margin": "48px",
                        "grid-gutter": "24px",
                    },
                    fontFamily: {
                        "serif": ["Noto Serif", "serif"],
                        "sans": ["Space Grotesk", "sans-serif"]
                    }
                }
            }
        }
    </script>

    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .nested-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gold-glow {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
        
        .toast {
            position: fixed; right: 1.25rem; top: 1.25rem;
            background: rgba(18, 20, 27, 0.92); border: 1px solid #d4af37;
            padding: 0.6rem 0.9rem; border-radius: 0.75rem; z-index: 9999;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
        
        #loadingOverlay { position: fixed; inset: 0; z-index: 200; background: rgba(10, 11, 15, .85); backdrop-filter: blur(10px); }
        .spinner { width: 56px; height: 56px; border-radius: 50%; border: 3px solid rgba(212, 175, 55, .25); border-top-color: var(--gold); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg) } }
    </style>
</head>

<body class="bg-background text-white font-sans overflow-x-hidden min-h-screen">

    <div id="navbar-container"></div>

    <div id="loadingOverlay" class="flex items-center justify-center">
        <div class="glass-panel p-6 rounded-2xl flex items-center gap-4">
            <div class="spinner"></div>
            <div class="text-sm text-on-surface-variant">Accessing Command Secure...</div>
        </div>
    </div>

    <main class="pt-32 px-grid-margin pb-20">
        <section class="max-w-7xl mx-auto">
            <header class="flex justify-between items-end mb-12">
                <div>
                    <h1 class="font-serif text-4xl text-primary mb-2">Project Command</h1>
                    <p class="text-on-surface-variant max-w-2xl">High-fidelity oversight of current Morrow Industries initiatives.</p>
                </div>
                <div class="flex gap-4">
                    <button id="addProjectBtn" class="bg-primary text-black font-bold py-3 px-8 gold-glow hover:brightness-110 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined">add</span>
                        NEW INITIATIVE
                    </button>
                </div>
            </header>

            <div class="mt-6 flex flex-wrap gap-2 mb-8">
                <button class="tab-btn px-4 py-2 border border-white/10 rounded active text-primary border-primary" data-tab="projects">Projects</button>
                <button class="tab-btn px-4 py-2 border border-white/10 rounded" data-tab="products">Store</button>
                <button class="tab-btn px-4 py-2 border border-white/10 rounded" data-tab="users">Users</button>
            </div>

            <div id="panel-projects" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-grid-gutter"></div>
            <div id="panel-products" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-grid-gutter"></div>
            <div id="panel-users" class="hidden space-y-4"></div>
        </section>
    </main>

    <div id="projectModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md hidden">
        <div class="max-w-6xl w-full h-[850px] glass-panel shadow-2xl flex flex-col relative overflow-hidden rounded-xl">
            
            <header class="h-20 border-b border-white/10 px-8 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <span class="material-symbols-outlined text-primary text-3xl">terminal</span>
                    <h2 id="projectModalTitle" class="font-serif text-2xl text-white">Mission Control Interface</h2>
                </div>
                <button id="closeProjectModal" class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-all text-3xl">close</button>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <aside class="w-64 border-r border-white/5 flex flex-col py-8 bg-black/20">
                    <button data-view="basics" class="modal-tab flex items-center gap-4 px-8 py-4 text-primary bg-primary/5 border-r-2 border-primary">
                        <span class="material-symbols-outlined">info</span>
                        <span class="text-xs font-bold tracking-widest uppercase">Basics</span>
                    </button>
                    <button data-view="sections" class="modal-tab flex items-center gap-4 px-8 py-4 text-on-surface-variant opacity-60 hover:opacity-100 transition-all">
                        <span class="material-symbols-outlined">account_tree</span>
                        <span class="text-xs font-bold tracking-widest uppercase">Architecture</span>
                    </button>
                    <button data-view="json" class="modal-tab flex items-center gap-4 px-8 py-4 text-on-surface-variant opacity-60 hover:opacity-100 transition-all">
                        <span class="material-symbols-outlined">data_object</span>
                        <span class="text-xs font-bold tracking-widest uppercase">Manifest</span>
                    </button>
                </aside>

                <form id="projectForm" class="flex-1 overflow-y-auto p-10 custom-scrollbar">
                    <div id="view-basics" class="space-y-8 max-w-4xl">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div class="md:col-span-2">
                                <label class="block text-xs font-bold text-primary mb-2 uppercase tracking-widest">Initiative Designation</label>
                                <input id="proj_title" required class="w-full bg-white/5 border-none border-b border-white/20 focus:ring-0 text-2xl font-serif text-white py-3" />
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-primary mb-2 uppercase tracking-widest">Operation Status</label>
                                <select id="proj_status" class="w-full bg-white/5 border border-white/10 focus:ring-0 py-3 px-4 text-white">
                                    <option value="active">ACTIVE</option>
                                    <option value="planning">PLANNING</option>
                                    <option value="complete">COMPLETE</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-8">
                            <label class="block text-xs font-bold text-primary mb-2 uppercase tracking-widest">Progress %
                                <input id="proj_progress" type="number" class="w-full bg-white/5 border border-white/10 focus:ring-0 mt-2 text-white" />
                            </label>
                            <label class="block text-xs font-bold text-primary mb-2 uppercase tracking-widest">Category Type
                                <select id="proj_type" class="w-full bg-white/5 border border-white/10 focus:ring-0 mt-2 text-white">
                                    <option value="hardware">HARDWARE</option>
                                    <option value="android">ANDROID</option>
                                    <option value="web">WEB</option>
                                </select>
                            </label>
                        </div>
                        <textarea id="proj_summary" rows="4" class="w-full bg-white/5 border border-white/10 focus:ring-0 p-4 text-white" placeholder="Strategic Summary..."></textarea>
                    </div>

                    <div id="view-sections" class="hidden space-y-12 max-w-4xl">
                        <div class="flex justify-between items-center">
                            <h3 class="font-serif text-2xl">Phase Architecture</h3>
                            <button id="addProjectSection" type="button" class="glass-panel px-6 py-2 flex items-center gap-2 text-primary hover:bg-primary/10 transition-all">
                                <span class="material-symbols-outlined">add_circle</span> ADD PHASE
                            </button>
                        </div>
                        <div id="projectSectionsEditor" class="space-y-8"></div>
                    </div>

                    <div id="view-json" class="hidden h-full">
                        <textarea id="proj_structure_json" spellcheck="false" class="w-full h-[500px] bg-black/40 border border-white/10 p-6 font-mono text-sm text-primary/80 custom-scrollbar"></textarea>
                    </div>
                </form>
            </div>

            <footer class="h-20 border-t border-white/10 px-8 flex items-center justify-end gap-6 bg-black/10">
                <span id="projectModalStatus" class="text-xs text-on-surface-variant"></span>
                <button id="saveProjectAction" class="bg-primary text-black font-bold px-10 h-12 gold-glow hover:brightness-110 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">save</span> SYNCHRONIZE
                </button>
            </footer>
        </div>
    </div>

    <script type="module">
        import { auth, provider, db, storage } from "/assets/js/firebase-init.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc, collection, addDoc, updateDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // State & Elements
        let projectSectionsState = [];
        let editProjectId = null;
        const projectModal = document.getElementById('projectModal');
        const sectionsEditor = document.getElementById('projectSectionsEditor');

        // UI Logic: Tabs
        const modalTabs = document.querySelectorAll('.modal-tab');
        modalTabs.forEach(tab => {
            tab.onclick = () => {
                modalTabs.forEach(t => t.classList.replace('text-primary', 'text-on-surface-variant'));
                tab.classList.replace('text-on-surface-variant', 'text-primary');
                ['basics', 'sections', 'json'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
                document.getElementById(`view-${tab.dataset.view}`).classList.remove('hidden');
            };
        });

        // Project Templates
        function renderProjectCard(id, p) {
            const progress = p.progress || 0;
            return `
            <div class="glass-panel p-card-padding flex flex-col h-full group hover:border-primary/30 transition-all">
                <div class="flex justify-between items-start mb-6">
                    <span class="text-[10px] font-bold text-primary tracking-widest px-2 py-1 bg-primary/5 border border-primary/20 uppercase">${p.type || 'PROJECT'}</span>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="window.editProject('${id}')" class="text-primary hover:scale-110 transition-transform"><span class="material-symbols-outlined">edit</span></button>
                        <button onclick="window.deleteProject('${id}')" class="text-error hover:scale-110 transition-transform"><span class="material-symbols-outlined">delete</span></button>
                    </div>
                </div>
                <h3 class="font-serif text-2xl text-primary mb-4">${p.title}</h3>
                <p class="text-sm text-on-surface-variant mb-8 flex-1 line-clamp-3">${p.summary || 'No manifest summary.'}</p>
                <div class="space-y-4">
                    <div class="flex justify-between text-[10px] font-bold text-on-surface-variant"><span>STABILITY</span><span>${progress}%</span></div>
                    <div class="h-1 w-full bg-white/5"><div class="h-full bg-primary gold-glow" style="width: ${progress}%"></div></div>
                </div>
            </div>`;
        }

        function renderSections() {
            sectionsEditor.innerHTML = projectSectionsState.map((sec, si) => `
                <div class="glass-panel p-8 relative">
                    <div class="absolute left-0 top-0 w-1 h-full bg-primary/40"></div>
                    <div class="flex justify-between items-center mb-6 pl-4">
                        <input class="bg-transparent border-none text-xl font-serif text-primary p-0 w-full focus:ring-0" 
                               value="${sec.title}" oninput="window.updateSec(${si}, 'title', this.value)" />
                        <button onclick="window.removeSec(${si})" class="text-error opacity-40 hover:opacity-100"><span class="material-symbols-outlined">delete_sweep</span></button>
                    </div>
                    <div class="ml-8 pl-8 border-l-2 border-primary/20 space-y-6">
                        ${(sec.versions || []).map((v, vi) => `
                            <div class="nested-card p-6 flex flex-col gap-4">
                                <input class="bg-transparent border-none text-primary text-xs font-bold p-0" value="${v.version}" oninput="window.updateVer(${si}, ${vi}, 'version', this.value)"/>
                                <textarea class="bg-black/20 border border-white/5 p-4 text-sm text-on-surface-variant" oninput="window.updateVer(${si}, ${vi}, 'changes', this.value)">${v.changes}</textarea>
                            </div>
                        `).join('')}
                        <button type="button" onclick="window.addVer(${si})" class="text-[10px] font-bold text-on-surface-variant hover:text-primary transition-all">+ ADD ITERATION</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('proj_structure_json').value = JSON.stringify({ sections: projectSectionsState }, null, 2);
        }

        // Bridge Logic
        window.editProject = async (id) => {
            editProjectId = id;
            const snap = await getDoc(doc(db, "projects", id));
            const p = snap.data();
            document.getElementById('proj_title').value = p.title;
            document.getElementById('proj_status').value = p.status;
            document.getElementById('proj_progress').value = p.progress;
            document.getElementById('proj_type').value = p.type || 'hardware';
            document.getElementById('proj_summary').value = p.summary;
            projectSectionsState = p.structure?.sections || [];
            renderSections();
            projectModal.classList.remove('hidden');
        };

        window.deleteProject = async (id) => { if(confirm("Purge initiative?")) await deleteDoc(doc(db, "projects", id)); };
        window.updateSec = (si, f, v) => { projectSectionsState[si][f] = v; };
        window.removeSec = (si) => { projectSectionsState.splice(si, 1); renderSections(); };
        window.addVer = (si) => { projectSectionsState[si].versions.push({ version: 'v1.0', changes: '' }); renderSections(); };
        window.updateVer = (si, vi, f, v) => { projectSectionsState[si].versions[vi][f] = v; };
        window.removeVer = (si, vi) => { projectSectionsState[si].versions.splice(vi, 1); renderSections(); };

        // Auth & Init
        onAuthStateChanged(auth, async user => {
            document.getElementById('loadingOverlay').style.display = 'none';
            if (!user) return;
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists() && snap.data().role === 'admin') {
                onSnapshot(query(collection(db, "projects"), orderBy("updatedAt", "desc")), snap => {
                    document.getElementById('panel-projects').innerHTML = snap.docs.map(d => renderProjectCard(d.id, d.data())).join('');
                });
            }
        });

        document.getElementById('addProjectBtn').onclick = () => { editProjectId = null; projectSectionsState = []; renderSections(); projectModal.classList.remove('hidden'); };
        document.getElementById('closeProjectModal').onclick = () => projectModal.classList.add('hidden');
        document.getElementById('addProjectSection').onclick = () => { projectSectionsState.push({ title: 'New Phase', versions: [] }); renderSections(); };
        
        document.getElementById('saveProjectAction').onclick = async () => {
            const data = {
                title: document.getElementById('proj_title').value,
                status: document.getElementById('proj_status').value,
                progress: Number(document.getElementById('proj_progress').value),
                summary: document.getElementById('proj_summary').value,
                type: document.getElementById('proj_type').value,
                structure: { sections: projectSectionsState },
                updatedAt: new Date()
            };
            if (editProjectId) await updateDoc(doc(db, "projects", editProjectId), data);
            else await addDoc(collection(db, "projects"), { ...data, createdAt: new Date() });
            projectModal.classList.add('hidden');
        };
    </script>
</body>
</html>
