<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Morrow Industries — Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="/assets/js/maintenance-listener.js"></script>
  <style>
    :root {
      --bg: #000;
      --surface: #12141b;
      --muted: #a9b0be;
      --text: #e9eef8;
      --gold: #d4af37;
      --border: rgba(255, 255, 255, 0.08)
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    .page-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, .08), transparent 38rem),
        radial-gradient(circle at bottom right, rgba(80, 120, 255, .08), transparent 34rem);
      backdrop-filter: blur(3px);
    }

    .glass {
      background: rgba(18, 20, 27, .6);
      backdrop-filter: saturate(140%) blur(14px);
      border: 1px solid var(--border)
    }

    .gold { color: var(--gold) }

    .btn {
      border: 1px solid var(--border);
      color: var(--text);
      padding: .6rem .9rem;
      border-radius: .6rem;
      transition: transform .15s ease, box-shadow .2s ease, background .2s ease
    }

    .btn-primary { border-color: #d4af37 }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .35)
    }

    .navbar a { opacity: .9 }
    .navbar a:hover { opacity: 1 }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden
    }

    .particles span {
      position: absolute;
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 9999px;
      background: var(--gold);
      opacity: .15;
      filter: blur(.5px);
      animation: float var(--dur) linear infinite;
      left: var(--x);
      top: var(--y)
    }

    @keyframes float {
      to {
        transform: translateY(-300vh) translateX(var(--drift, 0px));
        opacity: 0
      }
    }

    .fade-in {
      opacity: 0;
      transform: translateY(6px);
      animation: fadeIn .6s ease forwards
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: none }
    }

    .chip {
      display: inline-flex;
      width: fit-content;
      padding: .25rem .55rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      color: var(--gold);
      background: rgba(212, 175, 55, .08);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
  </style>

</head>

<body class="min-h-screen text-[var(--text)] bg-[var(--bg)] selection:bg-[var(--gold)]/20">
  <div class="page-overlay"></div>
  <div class="particles" id="particles"></div>

  <div id="navbar-container"></div>
  <script>
    fetch("/assets/modules/navbar.html")
      .then(res => res.text())
      .then(html => {
        const container = document.getElementById("navbar-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        temp.querySelectorAll("style").forEach(style => {
          const newStyle = document.createElement("style");
          newStyle.textContent = style.textContent;
          document.head.appendChild(newStyle);
          style.remove();
        });

        container.innerHTML = temp.innerHTML;

        container.querySelectorAll("script").forEach(oldScript => {
          const s = document.createElement("script");
          s.type = oldScript.type || "text/javascript";
          if (oldScript.src) s.src = oldScript.src;
          else s.textContent = oldScript.textContent;
          document.body.appendChild(s);
        });
      })
      .catch(err => console.error("Navbar load failed:", err));
  </script>

  <header class="sticky top-0 z-50 border-b border-[var(--border)] bg-[var(--bg)]/80 backdrop-blur"></header>

  <main class="mx-auto max-w-7xl px-4 py-10 my-10 relative z-[2]">
    <section class="glass rounded-2xl p-6 md:p-8 fade-in">
      <div class="text-sm uppercase tracking-wide text-[var(--muted)]">Morrow Industries</div>
      <h1 class="mt-2 font-serif text-4xl sm:text-5xl">Projects</h1>
      <p class="mt-3 text-[var(--muted)] max-w-3xl">
        Live project index with structured project sections, version history, progress, source links, and direct project pages.
      </p>
    </section>

    <div class="mt-6 flex flex-wrap gap-2 text-sm relative z-[2]">
      <button class="btn btn-primary" data-filter="all">All</button>
      <button class="btn" data-filter="school">School</button>
      <button class="btn" data-filter="personal">Personal</button>
      <button class="btn" data-filter="hardware">Hardware</button>
      <button class="btn" data-filter="web">Web</button>
      <button class="btn" data-filter="android">Android</button>
    </div>

    <section id="grid" class="mt-8 grid sm:grid-cols-2 lg:grid-cols-3 gap-5 relative z-[2]"></section>
  </main>

  <footer class="mt-10 border-t border-[var(--border)] relative" style="z-index:2">
    <div class="mx-auto max-w-7xl px-4 py-6 text-sm text-[var(--muted)] flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between">
      <div>© <span id="year"></span> Morrow Industries</div>
      <div class="space-x-4"><a href="/privacy">Privacy</a><a href="/terms">Terms</a></div>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (function makeParticles() {
      const wrap = document.getElementById('particles');
      const count = 56;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('span');
        s.style.setProperty('--x', Math.random() * 100 + 'vw');
        s.style.setProperty('--y', (100 + Math.random() * 40) + 'vh');
        s.style.setProperty('--drift', (Math.random() * 20 - 10) + 'px');
        s.style.setProperty('--dur', (1 + Math.random() * 14) + 's');
        s.style.opacity = (0.08 + Math.random() * 0.15).toFixed(2);
        wrap.appendChild(s);
      }
    })();
  </script>

  <script type="module">
    import { db } from "/assets/js/firebase-init.js";
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const grid = document.getElementById('grid');
    let cache = [];

    function escapeHtml(value = "") {
      return String(value).replace(/[&<>'"]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function projectHref(p) {
      return p.link || p.url || (p.slug ? `/projects/${p.slug}/` : `/projects/${p.id}/`);
    }

    async function loadProjects() {
      const q = query(collection(db, 'projects'), orderBy('updatedAt', 'desc'));
      const snaps = await getDocs(q);
      cache = snaps.docs.map(d => ({ id: d.id, ...d.data() }));
      render('all');
    }

    function card(p) {
      const type = escapeHtml(p.type || 'Project');
      const tags = Array.isArray(p.tags) ? p.tags : [];
      const progress = Number(p.progress || 0);
      const sections = Array.isArray(p.sections) ? p.sections : [];
      const versionCount = sections.reduce((total, section) => total + (Array.isArray(section.versions) ? section.versions.length : 0), 0);
      const sectionPreview = sections.slice(0, 3).map(section => `
        <span class="chip">${escapeHtml(section.title || section.name || 'Section')}</span>
      `).join('');
      const status = p.status || (progress >= 100 ? 'Complete' : 'Active');
      const href = projectHref(p);

      return `
    <article class="glass rounded-xl p-5 border border-[var(--border)] flex flex-col">
      <div class="flex items-start justify-between gap-3">
        <div class="text-xs text-[var(--muted)]">${type}${tags.length ? ` • ${tags.map(escapeHtml).join(' • ')}` : ''}</div>
        <span class="chip">${escapeHtml(status)}</span>
      </div>

      <h2 class="mt-2 text-xl font-semibold text-[var(--gold)]">${escapeHtml(p.title || 'Untitled')}</h2>
      <p class="mt-2 text-sm text-[var(--muted)]">${escapeHtml(p.summary || '')}</p>

      ${p.goal ? `<div class="mt-4 glass rounded-lg p-3 text-sm text-[var(--muted)]"><span class="gold font-semibold">Goal:</span> ${escapeHtml(p.goal)}</div>` : ''}

      <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
        <div class="glass rounded-lg p-3">
          <div class="gold font-semibold">${sections.length}</div>
          <div class="text-[var(--muted)]">Sections</div>
        </div>
        <div class="glass rounded-lg p-3">
          <div class="gold font-semibold">${versionCount}</div>
          <div class="text-[var(--muted)]">Versions</div>
        </div>
      </div>

      ${sectionPreview ? `<div class="mt-4 flex flex-wrap gap-2">${sectionPreview}</div>` : ''}

      <div class="mt-4 h-2 rounded bg-white/5 overflow-hidden">
        <div class="h-full" style="background:var(--gold);width:${Math.max(0, Math.min(progress, 100))}%"></div>
      </div>
      <div class="mt-1 text-xs text-[var(--muted)]">${Math.max(0, Math.min(progress, 100))}% complete</div>

      <div class="mt-5 flex gap-2 pt-1">
        <a class="btn btn-primary text-sm text-center grow" href="${escapeHtml(href)}">Open Project</a>
        ${p.sourceLink ? `<a class="btn text-sm text-center" href="${escapeHtml(p.sourceLink)}">Source</a>` : ''}
      </div>
    </article>`;
    }

    function render(filter) {
      document.querySelectorAll('button[data-filter]').forEach(btn => {
        btn.classList.toggle('btn-primary', btn.dataset.filter === filter);
      });
      const items = cache.filter(p => filter === 'all' ? true : ((p.type || '').toLowerCase() === filter || (p.tags || []).map(t => String(t).toLowerCase()).includes(filter)));
      grid.innerHTML = items.map(card).join('') || `<div class='text-[var(--muted)]'>No matching projects.</div>`;
    }

    document.querySelectorAll('button[data-filter]').forEach(btn => btn.addEventListener('click', () => render(btn.dataset.filter)));
    loadProjects().catch(e => { console.error(e); grid.innerHTML = "<div class='text-[var(--muted)]'>Failed to load.</div>"; });
  </script>

  <script src="/assets/js/firebase-auth.js" type="module"></script>
  <script type="module" src="/assets/js/debug-listener.js"></script>
</body>

</html>
