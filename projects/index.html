<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Morrow Industries — Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="/assets/js/maintenance-listener.js"></script>
  <style>
    :root {
      --bg: #000;
      --surface: #12141b;
      --muted: #a9b0be;
      --text: #e9eef8;
      --gold: #d4af37;
      --border: rgba(255, 255, 255, 0.08)
    }

    .glass {
      background: rgba(18, 20, 27, .6);
      backdrop-filter: saturate(140%) blur(14px);
      border: 1px solid var(--border)
    }

    .gold {
      color: var(--gold)
    }

    .btn {
      border: 1px solid var(--border);
      color: var(--text);
      padding: .6rem .9rem;
      border-radius: .6rem;
      transition: transform .15s ease, box-shadow .2s ease, background .2s ease
    }

    .btn-primary {
      border-color: #d4af37
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .35)
    }

    .navbar a {
      opacity: .9
    }

    .navbar a:hover {
      opacity: 1
    }

    .status-chip {
      display: inline-flex;
      width: fit-content;
      padding: .25rem .55rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      color: var(--gold);
      background: rgba(212, 175, 55, .08);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
  </style>

</head>

<body class="min-h-screen text-[var(--text)] bg-[var(--bg)] selection:bg-[var(--gold)]/20">
  <div id="navbar-container"></div>
  <script>
    fetch("/assets/modules/navbar.html")
      .then(res => res.text())
      .then(html => {
        const container = document.getElementById("navbar-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        // Append styles properly
        temp.querySelectorAll("style").forEach(style => {
          const newStyle = document.createElement("style");
          newStyle.textContent = style.textContent;
          document.head.appendChild(newStyle);
          style.remove();
        });

        // Insert main HTML (without script/style)
        container.innerHTML = temp.innerHTML;

        // Execute scripts safely
        container.querySelectorAll("script").forEach(oldScript => {
          const s = document.createElement("script");
          s.type = oldScript.type || "text/javascript";
          if (oldScript.src) s.src = oldScript.src;
          else s.textContent = oldScript.textContent;
          document.body.appendChild(s);
        });
      })
      .catch(err => console.error("Navbar load failed:", err));
  </script>
  <header class="sticky top-0 z-50 border-b border-[var(--border)] bg-[var(--bg)]/80 backdrop-blur">

  </header>

  <main class="mx-auto max-w-7xl px-4 py-10 my-10">
    <h1 class="font-serif text-4xl">Projects</h1>
    <p class="mt-2 text-[var(--muted)]">Loaded live from Firestore.</p>

    <div class="mt-6 flex flex-wrap gap-2 text-sm">
      <button class="btn" data-filter="all">All</button>
      <button class="btn" data-filter="school">School</button>
      <button class="btn" data-filter="personal">Personal</button>
      <button class="btn" data-filter="hardware">Hardware</button>
      <button class="btn" data-filter="web">Web</button>
      <button class="btn" data-filter="android">Android</button>
    </div>

    <section id="grid" class="mt-8 grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></section>
  </main>

  <footer class="mt-10 border-t border-[var(--border)]">
    <div
      class="mx-auto max-w-7xl px-4 py-6 text-sm text-[var(--muted)] flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between">
      <div>© <span id="year"></span> Morrow Industries</div>
      <div class="space-x-4"><a href="/privacy">Privacy</a><a href="/terms">Terms</a></div>
    </div>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>


  <script type="module">
    import { db } from "/assets/js/firebase-init.js";
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const grid = document.getElementById('grid');
    let cache = [];

    async function loadProjects() {
      const q = query(collection(db, 'projects'), orderBy('updatedAt', 'desc'));
      const snaps = await getDocs(q);
      cache = snaps.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.visible !== false);
      render('all');
    }

    function card(p) {
      const type = (p.type || 'Project');
      const tags = (p.tags || []).join(' • ');
      const progress = Math.max(0, Math.min(Number(p.progress || 0), 100));
      const sections = Number(p.sectionCount || p.structure?.sections?.length || 0);
      const versions = Number(p.versionCount || (p.structure?.sections || []).reduce((sum, sec) => sum + (sec.versions?.length || 0), 0));
      const status = p.status || "active";
      const url = p.url || `/projects/${p.slug || ""}/`;
      const cover = p.cover ? `<img src="${p.cover}" alt="${p.title || "Project"}" class="w-full h-40 object-cover border-b border-[var(--border)]">` : "";
      const sectionPreview = (p.structure?.sections || []).slice(0, 3).map(sec => `
        <span class="rounded border border-[var(--border)] px-2 py-1 text-xs text-[var(--muted)]">${sec.title || "Section"}</span>
      `).join("");

      return `
    <article class="glass project-card rounded-xl overflow-hidden border border-[var(--border)]">
      ${cover}
      <div class="p-5 flex flex-col grow">
        <div class="flex items-start justify-between gap-3">
          <div class="text-xs text-[var(--muted)]">${type}${tags ? ` • ${tags}` : ''}</div>
          <span class="status-chip">${status}</span>
        </div>

        <h2 class="mt-2 text-lg font-semibold">${p.title || 'Untitled'}</h2>
        <p class="mt-2 text-sm text-[var(--muted)]">${p.summary || ''}</p>

        <div class="mt-4 grid grid-cols-3 gap-2 text-center text-xs">
          <div class="rounded border border-[var(--border)] p-2">
            <div class="text-[var(--gold)] font-semibold">${progress}%</div>
            <div class="text-[var(--muted)]">Progress</div>
          </div>
          <div class="rounded border border-[var(--border)] p-2">
            <div class="text-[var(--gold)] font-semibold">${sections}</div>
            <div class="text-[var(--muted)]">Sections</div>
          </div>
          <div class="rounded border border-[var(--border)] p-2">
            <div class="text-[var(--gold)] font-semibold">${versions}</div>
            <div class="text-[var(--muted)]">Versions</div>
          </div>
        </div>

        <div class="mt-3 h-2 rounded bg-white/5 overflow-hidden">
          <div class="h-full" style="background:var(--gold);width:${progress}%"></div>
        </div>

        ${sectionPreview ? `<div class="mt-4 flex flex-wrap gap-2">${sectionPreview}</div>` : ""}

        <div class="mt-auto pt-5">
          <a href="${url}" class="btn btn-primary inline-flex">Open Project</a>
        </div>
      </div>
    </article>`;
    }

    function render(filter) {
      const items = cache.filter(p => filter === 'all' ? true : ((p.type || '').toLowerCase() === filter || (p.tags || []).map(t => t.toLowerCase()).includes(filter)));
      grid.innerHTML = items.map(card).join('') || `<div class='text-[var(--muted)]'>No matching projects.</div>`;
    }

    document.querySelectorAll('button[data-filter]').forEach(btn => btn.addEventListener('click', () => render(btn.dataset.filter)));
    loadProjects().catch(e => { console.error(e); grid.innerHTML = "<div class='text-[var(--muted)]'>Failed to load.</div>"; });
  </script>


  <script src="/assets/js/firebase-auth.js" type="module"></script>
  <script type="module" src="/assets/js/debug-listener.js"></script>
</body>

</html>
