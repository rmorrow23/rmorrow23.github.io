<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morrow Drive</title>
  <link rel="icon" href="/morIcon.png" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #05070a;
      --panel: rgba(18, 23, 34, 0.78);
      --gold: #d4af37;
      --bronze: #c19144;
      --text: #f5f1e8;
      --muted: #aeb6c4;
      --line: rgba(212, 175, 55, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.16), transparent 34%),
        radial-gradient(circle at bottom right, rgba(193, 145, 68, 0.13), transparent 30%),
        linear-gradient(135deg, #05070a, #0b0e13 45%, #10141c);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .soft-glass {
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.075);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .gold-text {
      color: var(--gold);
    }

    .snap-x::-webkit-scrollbar {
      display: none;
    }

    .pulse-ring {
      position: absolute;
      inset: -10px;
      border-radius: 999px;
      border: 1px solid rgba(212, 175, 55, 0.34);
      opacity: 0;
      transform: scale(0.86);
      pointer-events: none;
    }

    .listening .pulse-ring {
      animation: pulse 1.35s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.9; transform: scale(0.86); }
      100% { opacity: 0; transform: scale(1.28); }
    }

    .command-chip {
      border: 1px solid rgba(212, 175, 55, 0.18);
      background: rgba(212, 175, 55, 0.075);
    }

    .command-list {
      max-height: 160px;
      overflow-y: auto;
    }

    .command-list::-webkit-scrollbar {
      width: 0;
      height: 0;
    }
  </style>
</head>

<body>
  <main class="h-screen w-screen p-4 md:p-6 flex flex-col gap-4">
    <header class="glass rounded-[2rem] px-5 py-4 flex items-center justify-between gap-4 shrink-0">
      <div>
        <div class="text-[0.68rem] tracking-[0.32em] uppercase gold-text font-bold">Morrow Industries</div>
        <h1 class="text-2xl md:text-4xl font-black tracking-tight leading-none mt-1">Drive</h1>
      </div>

      <div class="text-right">
        <div id="timeText" class="text-xl md:text-2xl font-bold">--:--</div>
        <div id="dateText" class="text-xs md:text-sm text-slate-400">Parked browser dashboard</div>
      </div>
    </header>

    <section class="grid grid-cols-1 lg:grid-cols-[1.05fr_1.45fr] gap-4 min-h-0 flex-1">
      <aside class="glass rounded-[2rem] p-5 flex flex-col justify-between gap-4 min-h-0">
        <div>
          <div class="flex items-center justify-between gap-4">
            <div>
              <h2 class="text-xl md:text-2xl font-black">Voice Control</h2>
              <p class="text-sm text-slate-400 mt-1">Say “add command” to create your own shortcut.</p>
            </div>

            <button id="micButton"
              class="relative h-20 w-20 rounded-full grid place-items-center bg-[#d4af37] text-[#0b0e13] shadow-2xl shadow-black/30 active:scale-95 transition">
              <span class="pulse-ring"></span>
              <svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 14.75c1.66 0 3-1.34 3-3V6.5c0-1.66-1.34-3-3-3s-3 1.34-3 3v5.25c0 1.66 1.34 3 3 3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M5.75 11.5a6.25 6.25 0 0 0 12.5 0M12 17.75v2.75M8.75 20.5h6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

          <div class="soft-glass rounded-3xl p-4 mt-5">
            <div class="text-xs uppercase tracking-[0.22em] text-slate-500 font-bold">Heard</div>
            <div id="heardText" class="text-lg font-semibold mt-2 min-h-[1.75rem]">Tap mic and speak</div>
            <div id="statusText" class="text-sm text-slate-400 mt-1">Ready</div>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-3">
            <div class="text-xs uppercase tracking-[0.22em] text-slate-500 font-bold">Commands</div>
            <button id="clearCustomCommands" class="text-xs text-slate-400 active:scale-95">Clear custom</button>
          </div>

          <div class="grid grid-cols-2 gap-2 text-sm">
            <button class="command-chip rounded-2xl px-3 py-3 text-left" data-say="add command">add command</button>
            <button class="command-chip rounded-2xl px-3 py-3 text-left" data-say="open youtube">open YouTube</button>
            <button class="command-chip rounded-2xl px-3 py-3 text-left" data-say="open google">open Google</button>
            <button class="command-chip rounded-2xl px-3 py-3 text-left" data-say="open chat gpt">open ChatGPT</button>
            <button class="command-chip rounded-2xl px-3 py-3 text-left" data-say="go back">go back</button>
            <button class="command-chip rounded-2xl px-3 py-3 text-left" data-say="reload">reload</button>
          </div>

          <div id="customCommandList" class="command-list mt-3 grid gap-2 text-xs"></div>
        </div>
      </aside>

      <section class="min-h-0 flex flex-col gap-4">
        <div class="grid grid-cols-3 gap-3 shrink-0">
          <button class="quick soft-glass rounded-3xl p-4 text-left active:scale-[0.98] transition" data-url="https://www.youtube.com">
            <div class="text-2xl">▶</div>
            <div class="font-bold mt-2">YouTube</div>
            <div class="text-xs text-slate-400">Media</div>
          </button>

          <button class="quick soft-glass rounded-3xl p-4 text-left active:scale-[0.98] transition" data-url="https://chatgpt.com">
            <div class="text-2xl">✦</div>
            <div class="font-bold mt-2">ChatGPT</div>
            <div class="text-xs text-slate-400">AI</div>
          </button>

          <button class="quick soft-glass rounded-3xl p-4 text-left active:scale-[0.98] transition" data-url="https://www.google.com">
            <div class="text-2xl">⌕</div>
            <div class="font-bold mt-2">Google</div>
            <div class="text-xs text-slate-400">Search</div>
          </button>
        </div>

        <div class="glass rounded-[2rem] p-4 min-h-0 flex-1">
          <div class="flex items-center justify-between gap-4 mb-3">
            <div>
              <h2 class="text-xl font-black">Launch Cards</h2>
              <p class="text-sm text-slate-400">Swipe sideways, no vertical clutter.</p>
            </div>
            <div class="text-xs text-slate-500 uppercase tracking-[0.18em]">Snap</div>
          </div>

          <div class="snap-x snap-mandatory overflow-x-auto flex gap-4 h-[calc(100%-4rem)] pb-1">
            <button class="quick snap-center min-w-[82%] md:min-w-[46%] soft-glass rounded-[2rem] p-6 text-left flex flex-col justify-between"
              data-url="https://morrow-industries.com">
              <div>
                <div class="text-xs tracking-[0.25em] uppercase gold-text font-bold">Home</div>
                <h3 class="text-3xl font-black mt-2">Morrow Industries</h3>
                <p class="text-slate-400 mt-2">Open the main ecosystem hub.</p>
              </div>
              <div class="text-sm text-slate-500 mt-8">morrow-industries.com</div>
            </button>

            <button class="quick snap-center min-w-[82%] md:min-w-[46%] soft-glass rounded-[2rem] p-6 text-left flex flex-col justify-between"
              data-url="https://morrow-industries.com/projects/SIP/">
              <div>
                <div class="text-xs tracking-[0.25em] uppercase gold-text font-bold">Project</div>
                <h3 class="text-3xl font-black mt-2">SIP</h3>
                <p class="text-slate-400 mt-2">Open the project presentation page.</p>
              </div>
              <div class="text-sm text-slate-500 mt-8">projects/SIP</div>
            </button>

            <button class="quick snap-center min-w-[82%] md:min-w-[46%] soft-glass rounded-[2rem] p-6 text-left flex flex-col justify-between"
              data-url="https://music.youtube.com">
              <div>
                <div class="text-xs tracking-[0.25em] uppercase gold-text font-bold">Audio</div>
                <h3 class="text-3xl font-black mt-2">Music</h3>
                <p class="text-slate-400 mt-2">Open YouTube Music for parked mode.</p>
              </div>
              <div class="text-sm text-slate-500 mt-8">music.youtube.com</div>
            </button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const micButton = document.getElementById("micButton");
    const heardText = document.getElementById("heardText");
    const statusText = document.getElementById("statusText");
    const timeText = document.getElementById("timeText");
    const dateText = document.getElementById("dateText");
    const customCommandList = document.getElementById("customCommandList");
    const clearCustomCommands = document.getElementById("clearCustomCommands");

    const STORAGE_KEY = "morrowDriveCustomVoiceCommands";

    const builtInCommands = {
      "open youtube": { type: "url", value: "https://www.youtube.com" },
      "open google": { type: "url", value: "https://www.google.com" },
      "open chat gpt": { type: "url", value: "https://chatgpt.com" },
      "open chatgpt": { type: "url", value: "https://chatgpt.com" },
      "open music": { type: "url", value: "https://music.youtube.com" },
      "open morrow industries": { type: "url", value: "https://morrow-industries.com" },
      "open sip": { type: "url", value: "https://morrow-industries.com/projects/SIP/" },
      "reload": { type: "browser", value: "reload" },
      "refresh": { type: "browser", value: "reload" },
      "go back": { type: "browser", value: "back" },
      "go forward": { type: "browser", value: "forward" }
    };

    let customCommands = loadCustomCommands();
    let addCommandMode = {
      active: false,
      step: "idle",
      phrase: ""
    };

    function normalizePhrase(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[.?!]/g, "")
        .replace(/\s+/g, " ");
    }

    function updateClock() {
      const now = new Date();
      timeText.textContent = now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
      dateText.textContent = now.toLocaleDateString([], {
        weekday: "long",
        month: "short",
        day: "numeric"
      });
    }

    updateClock();
    setInterval(updateClock, 1000);

    function loadCustomCommands() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch (error) {
        return {};
      }
    }

    function saveCustomCommands() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(customCommands));
      renderCustomCommands();
    }

    function renderCustomCommands() {
      const entries = Object.entries(customCommands);

      if (!entries.length) {
        customCommandList.innerHTML = `
          <div class="text-slate-500 text-xs">
            No custom commands yet.
          </div>
        `;
        return;
      }

      customCommandList.innerHTML = entries.map(([phrase, action]) => `
        <div class="soft-glass rounded-2xl px-3 py-2 flex items-center justify-between gap-3">
          <div class="min-w-0">
            <div class="font-bold truncate">${escapeHtml(phrase)}</div>
            <div class="text-slate-500 truncate">${escapeHtml(action.value)}</div>
          </div>
          <button class="delete-command text-slate-400 text-xs" data-phrase="${escapeHtml(phrase)}">Delete</button>
        </div>
      `).join("");

      document.querySelectorAll(".delete-command").forEach((button) => {
        button.addEventListener("click", () => {
          delete customCommands[button.dataset.phrase];
          saveCustomCommands();
          statusText.textContent = "Custom command deleted.";
        });
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function openUrl(url) {
      window.location.href = url;
    }

    function normalizeActionToUrl(actionText) {
      let action = normalizePhrase(actionText);

      action = action
        .replace(/^open /, "")
        .replace(/^go to /, "")
        .replace(/^navigate to /, "");

      const aliases = {
        "youtube": "https://www.youtube.com",
        "google": "https://www.google.com",
        "chat gpt": "https://chatgpt.com",
        "chatgpt": "https://chatgpt.com",
        "music": "https://music.youtube.com",
        "youtube music": "https://music.youtube.com",
        "morrow industries": "https://morrow-industries.com",
        "home": "https://morrow-industries.com",
        "sip": "https://morrow-industries.com/projects/SIP/"
      };

      if (aliases[action]) return aliases[action];

      let raw = actionText.trim();

      raw = raw
        .replace(/^open\s+/i, "")
        .replace(/^go to\s+/i, "")
        .replace(/^navigate to\s+/i, "")
        .replace(/\s+dot\s+/gi, ".")
        .replace(/\s+slash\s+/gi, "/")
        .replace(/\s+/g, "");

      if (raw.includes(".") && !/^https?:\/\//i.test(raw)) {
        raw = "https://" + raw;
      }

      if (/^https?:\/\//i.test(raw)) return raw;

      return "https://www.google.com/search?q=" + encodeURIComponent(actionText.trim());
    }

    function executeAction(action) {
      if (!action) return false;

      if (action.type === "url") {
        statusText.textContent = "Opening " + action.value;
        openUrl(action.value);
        return true;
      }

      if (action.type === "browser") {
        if (action.value === "reload") {
          statusText.textContent = "Reloading page.";
          window.location.reload();
          return true;
        }

        if (action.value === "back") {
          statusText.textContent = "Going back.";
          window.history.back();
          return true;
        }

        if (action.value === "forward") {
          statusText.textContent = "Going forward.";
          window.history.forward();
          return true;
        }
      }

      return false;
    }

    function handleAddCommandFlow(phrase) {
      const normalized = normalizePhrase(phrase);

      if (normalized === "cancel" || normalized === "cancel command") {
        addCommandMode = { active: false, step: "idle", phrase: "" };
        statusText.textContent = "Command creation canceled.";
        return true;
      }

      if (!addCommandMode.active && normalized === "add command") {
        addCommandMode = { active: true, step: "phrase", phrase: "" };
        statusText.textContent = "What phrase should trigger the command?";
        heardText.textContent = "Say the trigger phrase";
        setTimeout(startVoice, 650);
        return true;
      }

      if (addCommandMode.active && addCommandMode.step === "phrase") {
        if (!normalized || normalized === "add command") {
          statusText.textContent = "Please say the trigger phrase again.";
          setTimeout(startVoice, 650);
          return true;
        }

        addCommandMode.phrase = normalized;
        addCommandMode.step = "action";
        statusText.textContent = `Phrase saved: "${normalized}". Now say the action.`;
        heardText.textContent = "Say the action, like open YouTube";
        setTimeout(startVoice, 900);
        return true;
      }

      if (addCommandMode.active && addCommandMode.step === "action") {
        const url = normalizeActionToUrl(phrase);

        customCommands[addCommandMode.phrase] = {
          type: "url",
          value: url
        };

        const savedPhrase = addCommandMode.phrase;
        addCommandMode = { active: false, step: "idle", phrase: "" };
        saveCustomCommands();

        statusText.textContent = `Saved "${savedPhrase}" → ${url}`;
        heardText.textContent = "Command added";
        return true;
      }

      return false;
    }

    function handleVoicePhrase(phrase) {
      const normalized = normalizePhrase(phrase);
      heardText.textContent = phrase;

      if (handleAddCommandFlow(phrase)) return;

      const customAction = customCommands[normalized];
      if (customAction && executeAction(customAction)) return;

      const builtInAction = builtInCommands[normalized];
      if (builtInAction && executeAction(builtInAction)) return;

      if (normalized.startsWith("open ")) {
        const url = normalizeActionToUrl(phrase);
        executeAction({ type: "url", value: url });
        return;
      }

      statusText.textContent = "No matching command. Say “add command” to create one.";
    }

    document.querySelectorAll(".quick").forEach((button) => {
      button.addEventListener("click", () => openUrl(button.dataset.url));
    });

    document.querySelectorAll("[data-say]").forEach((button) => {
      button.addEventListener("click", () => {
        heardText.textContent = `"${button.dataset.say}"`;
        statusText.textContent = "Tap the mic and say this command.";
      });
    });

    clearCustomCommands.addEventListener("click", () => {
      customCommands = {};
      saveCustomCommands();
      statusText.textContent = "Custom commands cleared.";
    });

    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    let recognition = null;
    let listening = false;
    let finalTranscript = "";

    function setListening(value) {
      listening = value;
      micButton.classList.toggle("listening", value);
      if (value) statusText.textContent = "Listening...";
    }

    function startVoice() {
      if (!SpeechRecognition) {
        statusText.textContent = "Speech recognition is not available here.";
        heardText.textContent = "Bridge not detected";
        return;
      }

      if (listening) {
        try { recognition && recognition.stop(); } catch (e) {}
        setListening(false);
        return;
      }

      finalTranscript = "";
      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 5;

      recognition.onstart = () => {
        setListening(true);
        heardText.textContent = "Listening...";
      };

      recognition.onresult = (event) => {
        let latest = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          latest = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript = latest;
          }
        }

        if (latest) heardText.textContent = latest;
      };

      recognition.onerror = (event) => {
        statusText.textContent = "Voice error: " + (event.error || "unknown");
        setListening(false);
      };

      recognition.onend = () => {
        setListening(false);

        if (finalTranscript.trim()) {
          handleVoicePhrase(finalTranscript.trim());
        } else if (!addCommandMode.active) {
          statusText.textContent = "Ready";
        }
      };

      try {
        recognition.start();
      } catch (error) {
        statusText.textContent = "Could not start voice recognition.";
        setListening(false);
      }
    }

    micButton.addEventListener("click", startVoice);
    renderCustomCommands();
  </script>
</body>
</html>
